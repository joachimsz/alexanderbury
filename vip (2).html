<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP | Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        /* ================================================
           VIP COMING SOON — isolated styles
           (no style.css imported intentionally)
        ================================================ */

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background: #000000;
        }

        /* Blurry gradient background */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse at 25% 40%, rgba(55, 55, 55, 0.9) 0%, transparent 55%),
                        radial-gradient(ellipse at 75% 65%, rgba(30, 30, 30, 0.95) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 20%, rgba(40, 40, 40, 0.7) 0%, transparent 45%),
                        #000000;
            filter: blur(140px);
            transform: scale(1.3);
        }

        /* Noise grain overlay */
        .bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: 0.15;
            pointer-events: none;
        }

        /* Content */
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
        }

        h1 {
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.04em;
            line-height: 1;
        }

        .btn-return {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 14px 32px;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            letter-spacing: 0.02em;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: background 0.25s ease, border-color 0.25s ease, color 0.25s ease;
        }

        .btn-return:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="bg"></div>

    <div class="content">
        <span class="label">Alexander Bury · VIP</span>
        <h1>Coming Soon</h1>
        <a href="index.html" class="btn-return">Back</a>
    </div>

</body>
</html>
